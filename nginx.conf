server {
    listen 80;
    server_name *****;

    root /www/wwwroot/comfysd;
    index index.html;

    # ── 静态资源 ──────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        root /www/wwwroot/comfysd;
        expires 7d;
        access_log off;
    }

    # ── 上传文件 ──────────────────────────────────────
    location /uploads/ {
        alias /www/wwwroot/comfysd/uploads/;
        expires 7d;
    }

    # ── 图片代理 ──────────────────────────────────────
    location /proxy-image {
        proxy_pass              http://127.0.0.1:8000/proxy-image;
        proxy_http_version      1.1;
        proxy_set_header        Host            $host;
        proxy_set_header        X-Real-IP       $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      120s;
        proxy_connect_timeout   30s;
    }

    # ── FastAPI 具名路由 ──────────────────────────────
    location ~ ^/(prompt|history|upload|workflow|health|power-off|power-on) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout    360s;
        proxy_connect_timeout 60s;
        client_max_body_size  50M;
    }

    # ── Node.js API ───────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        client_max_body_size  50M;
    }

    # ── 根路径 ────────────────────────────────────────
    location = / {
    # GET 返回首页
    try_files /index.html =404;
    }

    location / {
        # 非根路径 GET 走静态文件
        try_files $uri $uri/ /index.html;
    }

    location = /generate {
        # 前端 POST 提交到此路径（需同步修改前端 AGENT_API_URL）
        proxy_pass              http://127.0.0.1:8000/;
        proxy_http_version      1.1;
        proxy_set_header        Host             $host;
        proxy_set_header        X-Real-IP        $remote_addr;
        proxy_set_header        X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout      360s;
        proxy_connect_timeout   60s;
        client_max_body_size    50M;
    }

    access_log  /www/wwwlogs/comfysd.access.log;
    error_log   /www/wwwlogs/comfysd.error.log;
}